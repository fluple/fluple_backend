name: CI/CD

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npm run prisma:generate
        env:
          DATABASE_URL: postgresql://postgres@localhost:5432/fluple?schema=public
      - name: Typecheck
        run: npx tsc --noEmit

  deploy:
    needs: ci
    if: github.ref == 'refs/heads/main' && secrets.DEPLOY_WEBHOOK_URL
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy hook
        run: curl -fsSL -X POST "$DEPLOY_WEBHOOK_URL"
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
